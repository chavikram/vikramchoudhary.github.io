<!DOCTYPE html>
<html>
<head>
<title>Garud Spray Test</title>
</head>

<body>

<h2>Website Response Test</h2>
<button onclick="startTest()">Start Test</button>

<div id="log"></div>

<script>

function log(msg){
  document.getElementById("log").innerHTML += msg + "<br>";
}

function startTest(){

let count=0;

let timer=setInterval(()=>{

fetch("/")
.then(r=>{
count++;
log("Request "+count+" success");
})
.catch(e=>{
log("Error: "+e);
});

if(count>=10){
clearInterval(timer);
log("Finished");
}

},2000);

}

</script>

</body>
</html>
